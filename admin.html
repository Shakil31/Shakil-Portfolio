<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio admin panel.">
  <link rel="stylesheet" href="assets/css/admin.css">
  <title>Portfolio Admin</title>
</head>
<body>
  <header class="admin-header">
    <div>
      <p>Portfolio Backend</p>
      <h1>Edit your website content</h1>
    </div>
    <div class="admin-actions">
      <span id="current-user">Checking login...</span>
      <a href="/" target="_blank" rel="noreferrer">View Site</a>
      <button class="button button--ghost" id="logout-button" type="button">Log out</button>
    </div>
  </header>

  <main class="admin-shell">
    <section class="panel">
      <h2>Profile</h2>
      <div class="form-grid">
        <label>Username<input id="profile-username" type="text" disabled></label>
        <label>Display name<input id="profile-display-name" type="text"></label>
      </div>
      <div class="inline-actions">
        <button class="button button--ghost" id="profile-save-button" type="button">Update profile</button>
      </div>
      <h3>Change Password</h3>
      <div class="form-grid">
        <label>Current password<input id="current-password" type="password" autocomplete="current-password"></label>
        <label>New password<input id="new-password" type="password" autocomplete="new-password"></label>
      </div>
      <div class="inline-actions">
        <button class="button button--ghost" id="password-save-button" type="button">Change password</button>
      </div>
      <p id="profile-status" class="status" aria-live="polite"></p>
    </section>

    <section class="panel">
      <div class="panel__head">
        <h2>Basic</h2>
        <button class="button" id="save-button" type="button">Save changes</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
      <div class="form-grid">
        <label>Site name<input id="siteName" type="text"></label>
        <label>Resume URL<input id="resumeUrl" type="text"></label>
      </div>
    </section>

    <section class="panel">
      <h2>Hero</h2>
      <div class="form-grid">
        <label>Greeting<input id="hero.greeting" type="text"></label>
        <label>Name<input id="hero.name" type="text"></label>
        <label>Accent word<input id="hero.split" type="text"></label>
        <label>Profession<input id="hero.profession" type="text"></label>
        <label>Resume label<input id="hero.resumeLabel" type="text"></label>
        <label>Image path<input id="hero.image" type="text"></label>
      </div>
    </section>

    <section class="panel">
      <h2>About</h2>
      <div class="form-grid">
        <label>Title<input id="about.title" type="text"></label>
        <label>Button label<input id="about.buttonLabel" type="text"></label>
        <label>Image path<input id="about.image" type="text"></label>
        <label class="wide">Description<textarea id="about.description"></textarea></label>
      </div>
    </section>

    <section class="panel">
      <h2>Projects</h2>
      <label>Section title<input id="projectsTitle" type="text"></label>
      <div class="repeat-list" id="projects-list"></div>
      <button class="button button--ghost" data-add="projects" type="button">Add project</button>
    </section>

    <section class="panel">
      <h2>Work</h2>
      <label>Section title<input id="workTitle" type="text"></label>
      <h3>Experience</h3>
      <div class="repeat-list" id="experience-list"></div>
      <button class="button button--ghost" data-add="experience" type="button">Add experience</button>
      <h3>Education</h3>
      <div class="repeat-list" id="education-list"></div>
      <button class="button button--ghost" data-add="education" type="button">Add education</button>
    </section>

    <section class="panel">
      <h2>Skills</h2>
      <label>Section title<input id="skillsTitle" type="text"></label>
      <div class="repeat-list" id="skills-list"></div>
      <button class="button button--ghost" data-add="skills" type="button">Add skill category</button>
    </section>

    <section class="panel">
      <h2>Certifications</h2>
      <label>Section title<input id="certificationsTitle" type="text"></label>
      <div class="repeat-list" id="certifications-list"></div>
      <button class="button button--ghost" data-add="certifications" type="button">Add certification</button>
    </section>

    <section class="panel">
      <h2>Services</h2>
      <label>Section title<input id="servicesTitle" type="text"></label>
      <div class="repeat-list" id="services-list"></div>
      <button class="button button--ghost" data-add="services" type="button">Add service</button>
    </section>

    <section class="panel">
      <h2>Testimonials</h2>
      <label>Section title<input id="testimonialsTitle" type="text"></label>
      <div class="repeat-list" id="testimonials-list"></div>
      <button class="button button--ghost" data-add="testimonials" type="button">Add testimonial</button>
    </section>

    <section class="panel">
      <h2>Contact</h2>
      <div class="form-grid">
        <label>Title<input id="contact.title" type="text"></label>
        <label>Description<input id="contact.description" type="text"></label>
        <label>Copy button label<input id="contact.copyButtonLabel" type="text"></label>
        <label>Email<input id="contact.email" type="email"></label>
        <label>Location<input id="contact.location" type="text"></label>
      </div>
    </section>

    <section class="panel">
      <h2>Social Links</h2>
      <div class="repeat-list" id="socials-list"></div>
      <button class="button button--ghost" data-add="socials" type="button">Add social link</button>
      <h3>Messaging Links</h3>
      <div class="repeat-list" id="messaging-list"></div>
      <button class="button button--ghost" data-add="messaging" type="button">Add messaging link</button>
    </section>

    <section class="panel">
      <h2>Footer</h2>
      <div class="form-grid">
        <label>Year<input id="footer.year" type="text"></label>
        <label>Copy<input id="footer.copy" type="text"></label>
      </div>
    </section>
  </main>

  <script src="assets/js/admin.js"></script>
</body>
</html>
