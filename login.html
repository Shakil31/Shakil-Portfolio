<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio admin login.">
  <link rel="stylesheet" href="assets/css/admin.css">
  <title>Admin Login</title>
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="panel login-card">
      <p class="eyebrow">Portfolio Backend</p>
      <h1>Admin login</h1>
      <p class="login-help">Use your profile to edit portfolio content.</p>

      <form id="login-form" class="login-form">
        <label>Username<input id="username" name="username" type="text" autocomplete="username" required></label>
        <label>Password<input id="password" name="password" type="password" autocomplete="current-password" required></label>
        <button class="button" type="submit">Log in</button>
      </form>

      <p id="login-status" class="status" aria-live="polite"></p>

    </section>
  </main>

  <script src="assets/js/login.js"></script>
</body>
</html>
